# .github/workflows/deploy-firestore-rules.yml
# ─── CI/CD: Firestore Security Rules → Firebase ────────────────────────────────
# Se ejecuta en cada push a main que modifique firestore.rules.
# Despliega las reglas automáticamente usando firebase-tools.

name: 🔐 Firestore Rules — Deploy

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch:

jobs:
  deploy-rules:
    name: Deploy Firestore Security Rules
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔐 Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project nexo-familia-6fdf6
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: 📊 Resultado
        run: echo "✅ Firestore Security Rules desplegadas correctamente"
